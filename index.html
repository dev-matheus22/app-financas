<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aplicativo de finanças</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="navbar">
    <span class="app-title">Aplicativo de finanças</span>
    <div class="nav-actions">
      <button class="nav-btn active" onclick="ativarMenu(this); mostrarTela('dashboard')">Dashboard</button>
      <button class="nav-btn" onclick="ativarMenu(this); mostrarLista(); mostrarTela('lista')">Registros</button>
      <button class="nav-btn" onclick="ativarMenu(this); mostrarTela('adicionar')">Novo</button>
    </div>
  </header>

  <!-- DASHBOARD -->
  <section id="tela-dashboard" class="tela">
    <h2>Visão Geral</h2>

    <div class="grid-metrics">
      <div class="card-dashboard">
        <span class="metric-title">Entradas</span>
        <span class="metric-value" id="totalEntradas">R$ 0,00</span>
      </div>

      <div class="card-dashboard">
        <span class="metric-title">Despesas</span>
        <span class="metric-value" id="totalDespesas">R$ 0,00</span>
      </div>

      <div class="card-dashboard">
        <span class="metric-title">Saldo</span>
        <span class="metric-value" id="saldo">R$ 0,00</span>
      </div>

      <div class="card-dashboard">
        <span class="metric-title">% Gasto</span>
        <span class="metric-value" id="percentualGasto">0%</span>
      </div>
    </div>
  </section>

  <!-- LISTA -->
  <section id="tela-lista" class="tela">
    <h2>Registros Financeiros</h2>
    <div id="lancamentoList"></div>
  </section>

  <!-- NOVO REGISTRO -->
  <section id="tela-adicionar" class="tela">
    <h2>Novo Registro</h2>

    <div class="form-card">
      <div class="input-group">
        <label>Valor</label>
        <input type="number" id="valor">
      </div>

      <div class="input-group">
        <label>Descrição</label>
        <input type="text" id="descricao">
      </div>

      <div class="input-group">
        <label>Categoria</label>
        <input type="text" id="categoria">
      </div>

      <div class="input-group">
        <label>Tipo</label>
        <select id="tipo">
          <option value="entrada">Entrada</option>
          <option value="despesa">Despesa</option>
        </select>
      </div>

      <div class="input-group">
        <label>Data</label>
        <input type="date" id="data">
      </div>

      <button class="btn btn-success" onclick="addRegistro()">Salvar</button>
    </div>
  </section>

  <!-- EDITAR -->
  <section id="tela-editar" class="tela">
    <h2>Editar Registro</h2>

    <div class="form-card">
      <div class="input-group">
        <label>Valor</label>
        <input type="number" id="valor-edit">
      </div>

      <div class="input-group">
        <label>Descrição</label>
        <input type="text" id="descricao-edit">
      </div>

      <div class="input-group">
        <label>Categoria</label>
        <input type="text" id="categoria-edit">
      </div>

      <div class="input-group">
        <label>Tipo</label>
        <select id="tipo-edit">
          <option value="entrada">Entrada</option>
          <option value="despesa">Despesa</option>
        </select>
      </div>

      <div class="input-group">
        <label>Data</label>
        <input type="date" id="data-edit">
      </div>

      <button class="btn btn-success" onclick="salvarRegistroEditado()">Atualizar</button>
    </div>
  </section>

  <script src="app.js"></script>
</body>
</html>
