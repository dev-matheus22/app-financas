<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login - DarkFinance</title>
  <link rel="stylesheet" href="auth.css">
</head>
<body>

  <div class="auth-container">
    <h1>Entrar</h1>
    <p>Acesse sua conta</p>

    <form>
      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="seu@email.com">
      </div>

      <div class="form-group">
        <label>Senha</label>
        <input type="password" placeholder="********">
      </div>

      <button class="btn" type="submit">
        Entrar
      </button>
    </form>

    <div class="footer-text">
      Não tem conta? <a href="register.html">Criar agora</a>
    </div>
  </div>

</body>
</html>
